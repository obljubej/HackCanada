<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Layer — Ask</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #a78bfa;
    }
    .status {
      font-size: 0.75rem;
      color: #71717a;
    }
    .status.connected { color: #4ade80; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-bottom: 1rem;
    }
    .msg {
      max-width: 90%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.9rem;
    }
    .msg.user {
      align-self: flex-end;
      background: #7c3aed;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1c1c1e;
      border: 1px solid #27272a;
      border-bottom-left-radius: 4px;
    }
    .msg.assistant .answer { white-space: pre-wrap; }
    .memories-section {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #27272a;
    }
    .memories-section summary {
      font-size: 0.75rem;
      color: #a78bfa;
      cursor: pointer;
      user-select: none;
    }
    .memory-item {
      margin-top: 0.5rem;
      padding: 0.5rem;
      background: #27272a;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .memory-item .type {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-right: 0.5rem;
    }
    .type.fact { background: #1e3a5f; color: #60a5fa; }
    .type.task { background: #3b1f1f; color: #f87171; }
    .type.project { background: #1a3b2a; color: #4ade80; }
    .type.preference { background: #3b2f1a; color: #fbbf24; }
    .type.person { background: #2d1b4e; color: #c084fc; }
    .type.summary { background: #1a2f3b; color: #67e8f9; }
    .memory-item .score {
      float: right;
      font-size: 0.7rem;
      color: #71717a;
    }
    .memory-item .content { margin-top: 0.25rem; color: #a1a1aa; }
    .loading {
      align-self: flex-start;
      padding: 0.75rem 1rem;
      color: #71717a;
      font-size: 0.85rem;
    }
    .loading .dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
    #input-area {
      display: flex;
      gap: 0.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid #27272a;
    }
    #question {
      flex: 1;
      padding: 0.75rem 1rem;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 10px;
      color: #e4e4e7;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #question:focus { border-color: #7c3aed; }
    #question::placeholder { color: #52525b; }
    #send-btn {
      padding: 0.75rem 1.25rem;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-btn:hover { background: #6d28d9; }
    #send-btn:disabled { background: #3f3f46; cursor: not-allowed; }
    .actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .action-btn {
      padding: 0.4rem 0.75rem;
      background: transparent;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #71717a;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .action-btn:hover { border-color: #7c3aed; color: #a78bfa; }
  </style>
</head>
<body>
  <header>
    <h1>Memory Layer</h1>
    <div class="actions">
      <button class="action-btn" onclick="resetConversation()">New Chat</button>
      <span id="status" class="status">checking...</span>
    </div>
  </header>
  <main>
    <div id="messages">
      <div class="msg assistant">
        <div class="answer">Hi! I can answer questions about your ingested documents and memories. Ask me anything.</div>
      </div>
    </div>
    <div id="input-area">
      <input type="text" id="question" placeholder="Ask about your documents..." autocomplete="off" />
      <button id="send-btn" onclick="ask()">Ask</button>
    </div>
  </main>

  <script>
    const messagesEl = document.getElementById('messages');
    const questionEl = document.getElementById('question');
    const sendBtn = document.getElementById('send-btn');
    const statusEl = document.getElementById('status');
    let currentThreadId = null;

    // Check OAuth status
    fetch('/oauth/status')
      .then(r => r.json())
      .then(d => {
        if (d.connected) {
          statusEl.textContent = 'Google connected';
          statusEl.className = 'status connected';
        } else {
          statusEl.innerHTML = '<a href="/oauth/login" style="color:#fbbf24">Connect Google</a>';
        }
      });

    questionEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        ask();
      }
    });

    function addMessage(role, content, memories, chunks) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;

      if (role === 'assistant') {
        let html = `<div class="answer">${escapeHtml(content)}</div>`;

        if (memories && memories.length > 0) {
          html += `<div class="memories-section">
            <details>
              <summary>${memories.length} supporting memories</summary>
              ${memories.map(m => `
                <div class="memory-item">
                  <span class="type ${m.memory_type}">${m.memory_type}</span>
                  <span class="score">${m.final_score?.toFixed(2) ?? ''}</span>
                  <div class="content">${escapeHtml(m.content)}</div>
                </div>
              `).join('')}
            </details>
          </div>`;
        }

        div.innerHTML = html;
      } else {
        div.textContent = content;
      }

      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addLoading() {
      const div = document.createElement('div');
      div.className = 'loading';
      div.id = 'loading';
      div.innerHTML = 'Searching memories and thinking<span class="dots"></span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeLoading() {
      const el = document.getElementById('loading');
      if (el) el.remove();
    }

    async function ask() {
      const q = questionEl.value.trim();
      if (!q) return;

      questionEl.value = '';
      sendBtn.disabled = true;
      addMessage('user', q);
      addLoading();

      try {
        const body = { question: q, userId: 'default-user' };
        if (currentThreadId) body.threadId = currentThreadId;

        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        removeLoading();

        if (data.error) {
          addMessage('assistant', 'Error: ' + data.error, [], []);
        } else {
          currentThreadId = data.threadId;
          addMessage('assistant', data.answer, data.retrievedMemories, data.retrievedChunks);
        }
      } catch (err) {
        removeLoading();
        addMessage('assistant', 'Network error: ' + err.message, [], []);
      }

      sendBtn.disabled = false;
      questionEl.focus();
    }

    function resetConversation() {
      currentThreadId = null;
      messagesEl.innerHTML = '';
      addMessage('assistant', 'Chat reset. Ask me anything about your documents.');
      fetch('/ask/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: 'default-user' }) });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
